<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المصادر - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    color: #1b4332;

    /* خلفية */
    background: url("https://images.unsplash.com/photo-1558114965-eeb97aa84c3b") no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    z-index: -1;
}

/* Navbar ثابت */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: white;
    border-bottom: 1px solid #ddd;
    z-index: 1000;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #52b788;
    transition: 0.3s;
}

.logo:hover {
    transform: scale(1.1);
    text-shadow: 0 0 10px #52b788;
}

.links {
    display: flex;
    gap: 20px;
}

.links a {
    text-decoration: none;
    color: #555;
    transition: 0.3s;
     margin-left:52px;
}

.links a:hover {
    color: #2d6a4f;
}

/* Container */
.container {
    margin-top: 120px;
    padding: 20px;
    max-width: 800px;
    margin-inline: auto;
    text-align: center;
}

/* Title */
h1 {
    font-size: 36px;
    font-weight: bold;
}
/* Source Cards */
.source {
    background: white;
    padding: 25px;
    margin: 20px 0;
    border-radius: 15px;
    border: 1px solid #ddd;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.source:hover {
    transform: translateY(-5px);
    background: #f1fdf4;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.source h3 {
    margin-bottom: 10px;
}

.source p {
    color: #555;
    margin-bottom: 10px;
}
/* Buttons */
.buttons {
    margin-top: 30px;
}

.btn {
    background: #2d6a4f;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: #40916c;
}
/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* تطبيق الأنيميشن */
.source {
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
}
/* QR */
.qr {
    position: fixed;
    bottom: 15px;
    left: 15px;
    background: rgba(255,255,255,0.9);
    padding: 8px;
    border-radius: 12px;
}
.source:nth-child(2){ animation-delay: 0.2s; }
.source:nth-child(3){ animation-delay: 0.4s; }
.source:nth-child(4){ animation-delay: 0.6s; }
.source:nth-child(5){ animation-delay: 0.8s; }
.qr img {
    width: 90px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <div class="logo">نور</div>

    <div class="links">
        <a href="index.html">الرئيسية</a>
        <a href="purpose.html">هدف المشروع</a>
        <a href="topics.html">المواضيع</a>
        <a href="quiz.html">الأسئلة</a>
        <a href="sources.html">المصادر</a>
    </div>
</nav>

<!-- Content -->
<div class="container">

    <h1>📚 المصادر</h1>

    <!-- مصدر 1 -->
    <div class="source">
        <h3>📖 كتاب السيرة النبوية</h3>
        <p>آخر تحديث 2025</p>

        <a href="books/seera.pdf" target="_blank">
            📥 تحميل الكتاب (PDF)
        </a>
    </div>

    <!-- مصدر 2 -->
    <div class="source">
        <h3>📖 الرحيق المختوم</h3>
        <p>صفي الرحمن المباركفوري</p>

        <a href="https://waqfeya.net/book.php?bid=1409" target="_blank">
            🔗 قراءة الكتاب
        </a>
    </div>

    <!-- مصدر 3 -->
    <div class="source">
        <h3>🌐 موقع إسلام ويب</h3>

        <a href="https://www.islamweb.net" target="_blank">
            🔗 زيارة الموقع
        </a>
    </div>

    <!-- مصدر 4 -->
    <div class="source">
        <h3>🌐 موقع الدرر السنية</h3>

        <a href="https://dorar.net" target="_blank">
            🔗 زيارة الموقع
        </a>
    </div>

    <div class="buttons">
        <a href="index.html" class="btn">🏠 الصفحة الرئيسية</a>
        <a href="javascript:history.back()" class="btn">⬅ الصفحة السابقة</a>
    </div>

</div>
<!-- QR -->
<div class="qr">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elgharibahmed091.github.io/noor-project/">
</div>

</body>
</html>
