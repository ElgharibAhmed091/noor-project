<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>هدف المشروع - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    color: #1b4332;
    background: url("https://images.unsplash.com/photo-1558114965-eeb97aa84c3b") no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    z-index: -1;
}

/* Navbar */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: white;
    border-bottom: 1px solid #ddd;
    z-index: 1000;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #52b788;
}

.links a {
    margin-left:52px;
    text-decoration: none;
    color: #555;
}

/* Container */
.container {
    margin-top: 130px;
    padding: 20px;
    max-width: 800px;
    margin-inline: auto;
    text-align: center;
}

/* Boxes */
.box {
    background: white;
    padding: 25px;
    margin: 15px 0;
    border-radius: 12px;
    border: 1px solid #ddd;
    transition: 0.3s;
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
}

.box:nth-child(2){ animation-delay: 0.2s; }
.box:nth-child(3){ animation-delay: 0.4s; }

.box:hover {
    background: #f1fdf4;
    transform: translateY(-5px);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Button */
.btn {
    margin-top: 20px;
    background: #2d6a4f;
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    text-decoration: none;
    display: inline-block;
}

/* الكورة */
#orbCanvas {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 120px;
    height: 120px;
    z-index: 999;
}

/* النص فوق الكورة */
.orb-text {
    position: fixed;
    bottom: 210px;
    right: 20px;
    background: #2d6a4f;
    color: white;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 999;
    animation: floatText 2s infinite;
}

.orb-text::after {
    content: "";
    position: absolute;
    bottom: -10px;
    right: 25px;
    border-width: 10px;
    border-style: solid;
    border-color: #2d6a4f transparent transparent transparent;
}

@keyframes floatText {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

/* QR */
.qr {
    position: fixed;
    bottom: 15px;
    left: 15px;
}

.qr img {
    width: 90px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">نور</div>

    <div class="links">
        <a href="index.html">الرئيسية</a>
        <a href="purpose.html">هدف المشروع</a>
        <a href="topics.html">المواضيع</a>
        <a href="quiz.html">الأسئلة</a>
        <a href="sources.html">المصادر</a>
    </div>
</nav>

<div class="container">

    <h1>🎯 هدف المشروع</h1>

    <div class="box">
        <h3>💡 فكرة المشروع</h3>
        <p>
            يهدف هذا الموقع إلى تقديم محتوى تعليمي مبسط عن السيرة النبوية بطريقة حديثة.
        </p>
    </div>

    <div class="box">
        <h3>🎯 الهدف من الموقع</h3>
        <p>
            عرض السيرة النبوية بشكل تفاعلي يساعد المستخدم على التعلم بسهولة.
        </p>
    </div>

    <a href="topics.html" class="btn">ابدأ استكشاف المواضيع 🚀</a>

</div>

<!-- النص -->
<div class="orb-text">اضغط علي الكورة 🔊</div>

<!-- الصوت -->
<audio id="voice" src="sound.wav"></audio>

<!-- الكورة -->
<canvas id="orbCanvas"></canvas>
<script src="orb.js"></script>

<script>
let audio = document.getElementById("voice");

/* تشغيل أول مرة */
window.addEventListener("load", function () {
    document.body.addEventListener("click", function () {
        audio.play().catch(()=>{});
    }, { once: true });
});

/* التحكم بالكورة */
window.addEventListener("DOMContentLoaded", function () {
    let orb = document.getElementById("orbCanvas");

    orb.addEventListener("click", function () {
        if(audio.paused){
            audio.play();
        } else {
            audio.pause();
        }
    });
});
</script>

<div class="qr">
   <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elgharibahmed091.github.io/noor-project/">
</div>

</body>
</html>
