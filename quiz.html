<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الأسئلة - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    color: #1b4332;
    background: url("https://images.unsplash.com/photo-1558114965-eeb97aa84c3b") no-repeat center center fixed;
    background-size: cover;
}

/* Overlay */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    z-index: -1;
}

/* Navbar */
.nav {
    text-align: center;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
    font-size: 22px;
    font-weight: bold;
}

/* Header */
.header {
    text-align: center;
    margin-top: 30px;
}

/* Topics */
.topic {
    background: white;
    margin: 12px auto;
    padding: 20px;
    width: 260px;
    border-radius: 15px;
    cursor: pointer;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.topic:hover {
    background: #d8f3dc;
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* Quiz Box */
.quiz-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
    max-width: 420px;
    margin-inline: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Options */
.option {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2d6a4f, #1b4332);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    transform: scale(1.03);
}

/* Result */
.result {
    margin-top: 10px;
    font-weight: bold;
}

/* Progress */
.progress {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #52b788, #2d6a4f);
    transition: 0.3s;
}

/* Restart */
.restart {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #1b4332;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* Buttons */
.buttons {
    text-align: center;
    margin-top: 30px;
}

.btn {
    background: #2d6a4f;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    transition: 0.3s;
}
/* شخصية نور */

/* حركة عائمة */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}
.noor {
    position: fixed;
    right: 20px;
    bottom: 100px;
    z-index: 999;
    text-align: center;
}

.noor-img {
    width: 170px;
    animation: float 3s ease-in-out infinite;
}

/* كلام */
.speech {
    position: absolute;
    bottom: 140px; /* ارفعها شوية */
    right: 10px;
    width: 100px;
    font-size: 15px;
}
/* حركة */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}
/* كلام نور */
.speech {
    position: absolute;
    bottom: 180px;
    right: 0;
   background: white;
    color: #1b4332;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
    width: 160px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.btn:hover {
    background: #40916c;
}

/* QR */
.qr {
    position: fixed;
    bottom: 15px;
    left: 15px;
    background: rgba(255,255,255,0.9);
    padding: 8px;
    border-radius: 12px;
}

.qr img {
    width: 90px;
}
</style>
</head>

<body>

<nav class="nav">🧠 اختبر نفسك</nav>

<div class="header">
    <h2>اختر الموضوع 👇</h2>
</div>
<div class="noor">
    <img src="image.png" class="noor-img">
    <div class="speech">أنا نور 😊 اختر موضوع وابدأ التحدي</div>
</div>
<div class="topic" onclick="startQuiz('madina')">📜 صحيفة المدينة</div>
<div class="topic" onclick="startQuiz('badr')">⚔️ غزوة بدر</div>
<div class="topic" onclick="startQuiz('ohod')">🛡️ غزوة أحد</div>
<div class="topic" onclick="startQuiz('khandaq')">🏹 غزوة الخندق</div>
<div class="topic" onclick="startQuiz('khaybar')">🏰 غزوة خيبر</div>

<div id="quiz"></div>

<div class="buttons">
    <a href="index.html" class="btn">🏠 الصفحة الرئيسية</a>
    <a href="javascript:history.back()" class="btn">⬅ الصفحة السابقة</a>
</div>

<div class="qr">
   <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elgharibahmed091.github.io/noor-project/">
</div>

<!-- صوت -->
<audio id="correctSound" src="correct.wav"></audio>
<audio id="wrongSound" src="wrong.wav"></audio>

<script>

/* نور */
document.querySelector(".noor").onclick = () => {
    let s = document.querySelector(".speech");
    s.style.display = s.style.display === "none" ? "block" : "none";
};

/* ================== QUIZ ================== */

let current = 0;
let score = 0;
let currentQuestions = [];

const questions = {

madina: [
{q:"ما هي صحيفة المدينة؟", options:["معركة","دستور","كتاب","اتفاق"], answer:"دستور"},
{q:"كتبت بعد؟", options:["بدر","الهجرة","أحد","الفتح"], answer:"الهجرة"},
{q:"هدفها؟", options:["حرب","تنظيم المجتمع","تجارة","سفر"], answer:"تنظيم المجتمع"},
{q:"شملت؟", options:["المسلمين فقط","اليهود فقط","الجميع","قريش"], answer:"الجميع"},
{q:"من كتبها؟", options:["عمر","النبي ﷺ","علي","أبو بكر"], answer:"النبي ﷺ"}
],

badr: [
{q:"متى حدثت بدر؟", options:["1هـ","2هـ","3هـ","4هـ"], answer:"2هـ"},
{q:"عدد المسلمين؟", options:["300","1000","50","10"], answer:"300"},
{q:"سبب الغزوة؟", options:["قافلة","رحلة","زيارة","لعب"], answer:"قافلة"},
{q:"نتيجة المعركة؟", options:["هزيمة","تعادل","نصر","انسحاب"], answer:"نصر"},
{q:"أهم درس؟", options:["الصبر","الخوف","الهروب","الكسل"], answer:"الصبر"}
],

ohod: [
{q:"سبب أحد؟", options:["انتقام","هجرة","سلام","تجارة"], answer:"انتقام"},
{q:"من خالف الأوامر؟", options:["الرماة","القادة","الجيش","الفرسان"], answer:"الرماة"},
{q:"ماذا حدث؟", options:["هزيمة جزئية","نصر","تعادل","انسحاب"], answer:"هزيمة جزئية"},
{q:"الدرس؟", options:["الطاعة","العصيان","الكسل","الخوف"], answer:"الطاعة"},
{q:"عدد الجيش؟", options:["700","50","1000","10"], answer:"700"}
],

khandaq: [
{q:"سبب الغزوة؟", options:["هجوم الأحزاب","رحلة","تجارة","زيارة"], answer:"هجوم الأحزاب"},
{q:"فكرة الخندق؟", options:["سلمان","عمر","علي","أبو بكر"], answer:"سلمان"},
{q:"ماذا حدث؟", options:["حصار","هجوم","انسحاب","سلام"], answer:"حصار"},
{q:"كيف انتهت؟", options:["نصر","هزيمة","تعادل","انسحاب"], answer:"نصر"},
{q:"الدرس؟", options:["التخطيط","الخوف","الكسل","الهروب"], answer:"التخطيط"}
],

khaybar: [
{q:"سبب الغزوة؟", options:["تحالف الأعداء","زيارة","رحلة","لعب"], answer:"تحالف الأعداء"},
{q:"أين خيبر؟", options:["خيبر","مكة","الشام","المدينة"], answer:"خيبر"},
{q:"كيف كانت الحصون؟", options:["قوية","ضعيفة","صغيرة","مفتوحة"], answer:"قوية"},
{q:"النتيجة؟", options:["نصر","هزيمة","تعادل","انسحاب"], answer:"نصر"},
{q:"الدرس؟", options:["الصبر","الخوف","الكسل","الهروب"], answer:"الصبر"}
]

};

/* بدء */
function startQuiz(topic){
    current = 0;
    score = 0;
    currentQuestions = questions[topic];
    showQuestion();
}

/* عرض */
function showQuestion(){
    let q = currentQuestions[current];

    document.getElementById("quiz").innerHTML = `
        <div class="quiz-box">
            <h3>${q.q}</h3>

            ${q.options.map(opt => `
                <button class="option" onclick="check(this,'${opt}','${q.answer}')">${opt}</button>
            `).join("")}

            <div class="result" id="result"></div>
        </div>
    `;
}

/* تحقق */
function check(btn, selected, correct){
    let result = document.getElementById("result");
    let buttons = document.querySelectorAll(".option");

    let correctSound = document.getElementById("correctSound");
    let wrongSound = document.getElementById("wrongSound");

    buttons.forEach(b => b.disabled = true);

    if(selected === correct){
        btn.style.background = "green";
        result.innerHTML = "✔ إجابة صحيحة";
        result.style.color = "green";
        score++;

        correctSound.currentTime = 0;
        correctSound.play();
    } else {
        btn.style.background = "red";

        buttons.forEach(b => {
            if(b.innerText === correct){
                b.style.background = "green";
            }
        });

        result.innerHTML = "❌ الإجابة الصحيحة: " + correct;
        result.style.color = "red";

        wrongSound.currentTime = 0;
        wrongSound.play();
    }

    setTimeout(next, 1200);
}

/* التالي */
function next(){
    current++;

    if(current < currentQuestions.length){
        showQuestion();
    } else {
        document.getElementById("quiz").innerHTML = `
            <div class="quiz-box">
                <h2>🎉 انتهى الاختبار</h2>
                <p>درجتك: ${score} / ${currentQuestions.length}</p>
                <button class="restart" onclick="location.reload()">إعادة</button>
            </div>
        `;
    }
}

</script>
</body>
</html>
