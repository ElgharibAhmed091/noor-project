<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختيار المواضيع - نور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    color: #1b4332;
    background: url("https://images.unsplash.com/photo-1558114965-eeb97aa84c3b") no-repeat center center fixed;
    background-size: cover;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    z-index: -1;
}

/* Navbar */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #52b788;
}

/* Links */
.links a {
    margin-left: 52px;
    text-decoration: none;
    color: #555;
}

/* Container */
.container {
    margin-top: 120px;
    padding: 20px;
    text-align: center;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 35px 20px;
    cursor: pointer;
    transition: 0.4s;
}

.card:hover {
    transform: scale(1.05);
    background: #d8f3dc;
}

/* النص فوق الكورة */
.orb-text {
    position: fixed;
    bottom: 210px;
    right: 20px;
    background: #2d6a4f;
    color: white;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 999;
    animation: floatText 2s infinite;
}

/* سهم */
.orb-text::after {
    content: "";
    position: absolute;
    bottom: -10px;
    right: 25px;
    border-width: 10px;
    border-style: solid;
    border-color: #2d6a4f transparent transparent transparent;
}

/* حركة */
@keyframes floatText {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}

/* الكورة */
#orbCanvas {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 120px;
    height: 120px;
    z-index: 999;
}

/* QR */
.qr {
    position: fixed;
    bottom: 15px;
    left: 15px;
}
.qr img {
    width: 90px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">نور</div>

    <div class="links">
        <a href="index.html">الرئيسية</a>
        <a href="purpose.html">هدف المشروع</a>
        <a href="topics.html">المواضيع</a>
        <a href="quiz.html">الأسئلة</a>
        <a href="sources.html">المصادر</a>
    </div>
</nav>

<div class="container">

    <h1>اختر الموضوع 👇</h1>

    <div class="cards">
        <div class="card" onclick="go('madina.html')">📜 صحيفة المدينة</div>
        <div class="card" onclick="go('badr.html')">⚔️ غزوة بدر</div>
        <div class="card" onclick="go('ohod.html')">🛡️ غزوة أحد</div>
        <div class="card" onclick="go('khandaq.html')">🏹 غزوة الخندق</div>
        <div class="card" onclick="go('khaybar.html')">🏰 غزوة خيبر</div>
    </div>

</div>

<!-- النص -->
<div class="orb-text">اختر الموضوع 👇</div>

<!-- الصوت -->
<audio id="voice" src="voice.mp3"></audio>

<!-- الكورة -->
<canvas id="orbCanvas"></canvas>
<script src="orb.js"></script>

<script>
let audio = document.getElementById("voice");

/* تشغيل أول مرة */
window.addEventListener("load", function () {
    document.body.addEventListener("click", function () {
        audio.play().catch(()=>{});
    }, { once: true });
});

/* التحكم بالكورة */
window.addEventListener("DOMContentLoaded", function () {
    let orb = document.getElementById("orbCanvas");

    orb.addEventListener("click", function () {
        if(audio.paused){
            audio.play();
        } else {
            audio.pause();
        }
    });
});

/* التنقل */
function go(page){
    audio.pause();
    window.location.href = page;
}
</script>

<div class="qr">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://elgharibahmed091.github.io/noor-project/">
</div>

</body>
</html>
